services:
  nginx-builder:
    build:
      context: .
      dockerfile: Dockerfile.build
    container_name: nginx-builder
    environment:
      - BUILD_JOBS=4
      - CONTAINER_TEST=1
      # Set to arm64 to cross-compile for arm64 (native amd64 container, no QEMU)
      # Leave unset or set to amd64 to build for amd64
      - CROSS_COMPILE_ARCH=arm64
    mem_limit: 8g
    cpus: 4.0
    volumes:
      - ./nginx-production-tpe-v22.sh:/root/build.sh:ro
      - build-output:/root/nginx-build
      - ./container-compose-output.txt:/root/build.log
    command: bash /root/build.sh
    stdin_open: false
    tty: false

volumes:
  build-output:
